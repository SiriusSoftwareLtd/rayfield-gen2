name: Pushed
permissions:
  contents: write
on:
  push:
    paths:
      - '**.luau'
      - '**.lua'
      - '**.rbxm'
      - '**.json'
      - '**.yml'
  pull_request:
    paths:
      - '**.luau'
      - '**.lua'
      - '**.rbxm'
      - '**.json'
      - '**.yml'

jobs:
  build_and_bundle:
    name: Bundle and Publish Rayfield Gen2 Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup RoKit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install RoKit packages
        run: |
          rokit trust rojo-rbx/rojo
          rokit trust lune-org/lune
          rokit trust seaofvoices/darklua
          rokit install

      - name: Bundle
        run: lune run wax bundle output="build/bundled.luau" input="wax.project.json" minify=true

      - name: Fetch Version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Finalise Release, Publish
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/bundled.luau
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "${{ env.VERSION }}-${{ github.run_id }}"
          name: Rayfield ${{ env.VERSION }}
