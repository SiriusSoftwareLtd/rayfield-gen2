name: Release Bundle

permissions: {}

on:
  release:
    types:
      - published

concurrency:
  group: release-bundle-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Validate release ref
        id: validate
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < version.txt)"
          if [ "$RELEASE_TAG" != "$VERSION" ]; then
            echo "Release tag '$RELEASE_TAG' must match version.txt '$VERSION'." >&2
            exit 1
          fi

          git fetch --no-tags origin "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          if ! git merge-base --is-ancestor HEAD "origin/$DEFAULT_BRANCH"; then
            echo "Release tag '$RELEASE_TAG' does not point to a commit on '$DEFAULT_BRANCH'." >&2
            exit 1
          fi

          printf 'release_tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup RoKit
        uses: CompeyDev/setup-rokit@1d9390883f7ebce19d48f5b8d006e11d387c92ab

      - name: Install RoKit packages
        run: make install

      - name: Bundle
        run: make bundle

      - name: Generate bundle checksum
        run: sha256sum build/bundled.luau > build/bundled.luau.sha256

      - name: Upload bundle artifact
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bundled-luau
          path: |
            build/bundled.luau
            build/bundled.luau.sha256
          if-no-files-found: error
          retention-days: 1

  upload:
    name: Upload Bundle to Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download bundle artifact
        # actions/download-artifact@v4
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bundled-luau
          path: build

      - name: Verify bundle checksum
        run: sha256sum --check build/bundled.luau.sha256

      - name: Upload bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" build/bundled.luau
