# rayfield.yml chains base: roblox, adding the executor globals we feature-detect.
# CI generates roblox.yml via `selene generate-roblox-std` before linting.
std = "rayfield"

[lints]
# We intentionally guard optional executor globals in boolean context.
global_usage = "allow"
# Shadowing is used deliberately in a few builders (local window = self.window etc).
shadowing = "allow"
# One-liner `if x then ... end` is the house style throughout the UI code.
multiple_statements = "allow"
# UDim2.new with explicit scale+offset is used deliberately; not always convertible.
roblox_manual_fromscale_or_fromoffset = "allow"
mixed_table = "allow"
